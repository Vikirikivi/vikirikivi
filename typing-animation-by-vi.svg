<svg width="600" height="82" viewBox="0 0 600 82" xmlns="http://www.w3.org/2000/svg">
  <title>Typing animation by @vikirikivi</title>
  <style>
    .line {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 17px;
      fill: #2D9596;
      text-anchor: middle;
      dominant-baseline: middle;
      opacity: 0;
    }
    .cur {
      font-family: 'Fira Code', monospace;
      font-size: 17px;
      fill: #2D9596;
      dominant-baseline: middle;
    }

    /* total cycle: 6 lines × 5s = 30s */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .cur { animation: blink 1s step-end infinite; }

    @keyframes show {
      0%      { opacity: 0; }
      3%      { opacity: 1; }
      80%     { opacity: 1; }
      96%     { opacity: 0; }
      100%    { opacity: 0; }
    }

    .l1 { animation: show 5s 0s infinite; }
    .l2 { animation: show 5s 5s infinite; }
    .l3 { animation: show 5s 10s infinite; }
    .l4 { animation: show 5s 15s infinite; }
    .l5 { animation: show 5s 20s infinite; }
    .l6 { animation: show 5s 25s infinite; }
  </style>

  <rect width="600" height="70" fill="none"/>

  <text class="line l1" x="300" y="35">Turning data into decisions 📊</text>
  <text class="line l2" x="300" y="35">▁▂▄▆█▆▄▂▁  crunching numbers daily</text>
  <text class="line l3" x="300" y="35">A |████████░░| 62% ← found the winner ✓</text>
  <text class="line l4" x="300" y="35">B |██████████| 78% ✓</text>
  <text class="line l5" x="300" y="35">retention 📉 0.35% → found why 🔍</text>
  <text class="line l6" x="300" y="35">█████ visitors → ██ retained → 💡 insights</text>

  <text class="cur" x="490" y="35">|</text>

  <text x="300" y="76" font-family="'Fira Code', monospace" font-size="11px" fill="#2D9596" text-anchor="middle" opacity="0.6">By @vikirikivi</text>
</svg>
